<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Encrypt X - Access Key</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    margin: 100;
    min-height: 100vh;

    background:
      radial-gradient(circle at center, rgba(0,0,0,0.75) 0%, rgba(2,6,23,0.95) 100%),
      url("https://raw.githubusercontent.com/ScriptObfuscator2/Website/refs/heads/main/Dark%20Theme%20With%20Light%20Bulb.jpeg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    font-family: "Courier New", monospace;
    color: #e2e8f0;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    padding: 20px;
    box-sizing: border-box;
  }

  .container {
    width: min(90%, 250px);
    background: rgba(15, 23, 42, 0.85);
    border: 2px solid #334155;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    text-align: center;
  }

  h1 {
    font-size: 18px;
    color: #ef4444;
    margin-bottom: 20px;
  }

  .subtitle {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 20px;
  }

  input {
    width: 90%;
    padding: 12px;
    background: rgba(2,6,23,0.9);
    border: 1px solid #334155;
    border-radius: 8px;
    color: #e2e8f0;
    font-size: 13px;
    outline: none;
  }

  button {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #ef4444;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #dc2626;
  }

  .footer {
    margin-top: 15px;
    font-size: 11px;
    color: #94a3b8;
  }

  .below-text {
    margin-top: 15px;
    font-size: 12px;
    color: #94a3b8;
    text-align: center;
  }

  .below-text a {
    color: #38bdf8;
    text-decoration: none;
  }

  .date {
    position: fixed;
    bottom: 10px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 10px;
    color: #64748b;
    pointer-events: none;
  }
</style>
</head>

<body>

<div class="container">

  <h1>Access Key Required</h1>

  <div class="subtitle">
    Enter your key to access this script
  </div>

  <input type="text" id="keyInput" placeholder="Enter access key...">

  <button onclick="checkKey()">
    Access
  </button>

  <div class="footer">
    Encrypt X Secure Access System
  </div>

</div>

<div class="below-text">
  Do you want to obfuscate your script?
  <a href="https://encrypt-x.pages.dev/" target="_blank">Click here</a>
</div>

<div class="date">
  Published: NONE
</div>

<script>
let currentId = null;

// 🔥 GET ID + LOAD DATE
(async () => {
  const params = new URLSearchParams(window.location.search);
  currentId = params.get("Id");
  
  if (!currentId) return;

  try {
    const res = await fetch(`https://raw.githubusercontent.com/ScriptObfuscator2/Scripts/refs/heads/main/${currentId}`);
    
    if (res.ok) {
      const json = await res.json();

      if (json && json.Date) {
        const published = new Date(json.Date).toLocaleDateString("en-US", {
          month: "long",
          day: "numeric",
          year: "numeric"
        });

        document.querySelector(".date").innerText = `Published: ${published}`;
      }
    }
  } catch (err) {
    console.log("ERROR:", err);
  }
})();

// 🔐 CHECK KEY (BUTTON CLICK ONLY)
async function checkKey() {
  const key = document.getElementById("keyInput").value;

  if (!key) {
    alert("Please enter a key");
    return;
  }

  if (!currentId) {
    alert("Invalid script ID");
    return;
  }

  try {
    const res = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(`https://encrypt-x.scriptobfuscator2.workers.dev/check?Id=${currentId}&auth=${key}`)}`);
    const result = await res.text();

    if (result.trim() === "true") {
      alert("Access Granted");

      // 🔥 REDIRECT
      window.location.replace(`https://encrypt-x.pages.dev/Editor?Id=${currentId}&auth=${key}`);

    } else {
      alert("Invalid Key");
    }

  } catch (err) {
    console.log("ERROR:", err);
    alert("Error checking key");
  }
}
</script>

</body>
</html>
